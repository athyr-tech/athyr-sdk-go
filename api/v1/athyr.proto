syntax = "proto3";

package athyr.v1;

option go_package = "athyr/api/v1;athyrv1";

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// Athyr is the main platform service that agents interact with.
service Athyr {
  // ============ Agent Lifecycle ============

  // Connect registers an agent with the platform.
  rpc Connect(ConnectRequest) returns (ConnectResponse) {
    option (google.api.http) = {
      post: "/v1/connect"
      body: "*"
    };
  }

  // Heartbeat signals the agent is still alive.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse) {
    option (google.api.http) = {
      post: "/v1/heartbeat"
      body: "*"
    };
  }

  // Disconnect gracefully removes an agent from the platform.
  rpc Disconnect(DisconnectRequest) returns (DisconnectResponse) {
    option (google.api.http) = {
      post: "/v1/disconnect"
      body: "*"
    };
  }

  // ============ Messaging ============

  // Publish sends a message to a subject.
  rpc Publish(PublishRequest) returns (PublishResponse) {
    option (google.api.http) = {
      post: "/v1/publish"
      body: "*"
    };
  }

  // Subscribe opens a stream to receive messages on a subject.
  rpc Subscribe(SubscribeRequest) returns (stream SubscribeMessage);

  // Request sends a message and waits for a reply (request/reply pattern).
  rpc Request(RequestMessage) returns (ResponseMessage) {
    option (google.api.http) = {
      post: "/v1/request"
      body: "*"
    };
  }

  // ============ LLM ============

  // Complete performs a blocking LLM completion.
  rpc Complete(CompletionRequest) returns (CompletionResponse) {
    option (google.api.http) = {
      post: "/v1/complete"
      body: "*"
    };
  }

  // CompleteStream performs a streaming LLM completion.
  rpc CompleteStream(CompletionRequest) returns (stream StreamChunk);

  // ResumeStream resumes a durable stream from a given sequence.
  // Use this to reconnect after a disconnect when durable=true was used.
  rpc ResumeStream(ResumeStreamRequest) returns (stream StreamChunk);

  // ListModels returns available LLM models.
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse) {
    option (google.api.http) = {
      get: "/v1/models"
    };
  }

  // ============ Memory Sessions ============

  // CreateSession creates a new conversation session for memory.
  rpc CreateSession(CreateSessionRequest) returns (Session) {
    option (google.api.http) = {
      post: "/v1/sessions"
      body: "*"
    };
  }

  // GetSession retrieves an existing session.
  rpc GetSession(GetSessionRequest) returns (Session) {
    option (google.api.http) = {
      get: "/v1/sessions/{session_id}"
    };
  }

  // DeleteSession removes a session.
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse) {
    option (google.api.http) = {
      delete: "/v1/sessions/{session_id}"
    };
  }

  // AddHint adds a memory hint to a session.
  rpc AddHint(AddHintRequest) returns (AddHintResponse) {
    option (google.api.http) = {
      post: "/v1/sessions/{session_id}/hints"
      body: "*"
    };
  }

  // ============ KV Storage ============

  // KVGet retrieves a value from a bucket.
  rpc KVGet(KVGetRequest) returns (KVGetResponse) {
    option (google.api.http) = {
      get: "/v1/kv/{bucket}/{key}"
    };
  }

  // KVPut stores a value in a bucket.
  rpc KVPut(KVPutRequest) returns (KVPutResponse) {
    option (google.api.http) = {
      put: "/v1/kv/{bucket}/{key}"
      body: "*"
    };
  }

  // KVDelete removes a key from a bucket.
  rpc KVDelete(KVDeleteRequest) returns (KVDeleteResponse) {
    option (google.api.http) = {
      delete: "/v1/kv/{bucket}/{key}"
    };
  }

  // KVList lists keys in a bucket with optional prefix.
  rpc KVList(KVListRequest) returns (KVListResponse) {
    option (google.api.http) = {
      get: "/v1/kv/{bucket}"
    };
  }
}

// ============ Agent Lifecycle Messages ============

message AgentCard {
  string name = 1;
  string description = 2;
  string version = 3;
  repeated string capabilities = 4;
  map<string, string> metadata = 5;
}

message ConnectRequest {
  AgentCard agent_card = 1;
}

message ConnectResponse {
  string agent_id = 1;
  google.protobuf.Timestamp connected_at = 2;
}

message HeartbeatRequest {
  string agent_id = 1;
}

message HeartbeatResponse {
  bool ok = 1;
  google.protobuf.Timestamp server_time = 2;
}

message DisconnectRequest {
  string agent_id = 1;
}

message DisconnectResponse {
  bool ok = 1;
}

// ============ Messaging Messages ============

message PublishRequest {
  string agent_id = 1;
  string subject = 2;
  bytes data = 3;
}

message PublishResponse {
  bool ok = 1;
}

message SubscribeRequest {
  string agent_id = 1;
  string subject = 2;
  string queue_group = 3;  // Optional: for load-balanced subscriptions
}

message SubscribeMessage {
  string subject = 1;
  bytes data = 2;
  string reply = 3;  // Reply subject for request/reply pattern
}

message RequestMessage {
  string agent_id = 1;
  string subject = 2;
  bytes data = 3;
  int64 timeout_ms = 4;  // Timeout in milliseconds (default: 5000)
}

message ResponseMessage {
  bytes data = 1;
}

// ============ LLM Messages ============

message Message {
  string role = 1;                    // "system", "user", "assistant", "tool"
  string content = 2;
  repeated ToolCall tool_calls = 3;   // Tool calls made by assistant (role="assistant")
  string tool_call_id = 4;            // ID of the tool call this message responds to (role="tool")
}

// Tool defines a function that the LLM can call.
// Sent with CompletionRequest to describe available tools.
message Tool {
  string name = 1;         // Function name, e.g., "get_weather"
  string description = 2;  // What the tool does
  string parameters = 3;   // JSON Schema string defining input parameters
}

// ToolCall represents the LLM's request to invoke a tool.
// Returned in CompletionResponse when the LLM decides to use a tool.
message ToolCall {
  string id = 1;         // Unique identifier for this call (from LLM)
  string name = 2;       // Tool name to invoke
  string arguments = 3;  // JSON string of arguments
}

message CompletionConfig {
  double temperature = 1;   // 0.0-1.0
  int32 max_tokens = 2;
  double top_p = 3;
  repeated string stop = 4;
}

message CompletionRequest {
  string agent_id = 1;
  string model = 2;
  repeated Message messages = 3;
  CompletionConfig config = 4;
  string session_id = 5;       // Optional: for memory injection
  bool include_memory = 6;     // Whether to inject memory context
  bool durable = 7;            // Enable disconnect recovery for streaming
  repeated Tool tools = 8;     // Available tools the LLM can call
  string tool_choice = 9;      // "auto", "none", "required", or tool name
}

message TokenUsage {
  int32 prompt_tokens = 1;
  int32 completion_tokens = 2;
  int32 total_tokens = 3;
}

message CompletionResponse {
  string content = 1;
  string model = 2;
  string backend = 3;
  TokenUsage usage = 4;
  string finish_reason = 5;            // "stop", "length", "tool_calls"
  int64 latency_ms = 6;
  repeated ToolCall tool_calls = 7;    // Tool calls requested by LLM
}

message StreamChunk {
  string content = 1;
  bool done = 2;
  TokenUsage usage = 3;              // Only on final chunk
  string model = 4;                  // Only on final chunk
  string backend = 5;                // Only on final chunk
  string error = 6;                  // Error message if failed
  string accumulated_content = 7;    // Content streamed before error (for retry decisions)
  bool partial_response = 8;         // True if some content was streamed before error
  DurableStreamInfo stream_info = 9; // Only on first chunk of durable streams
  uint64 sequence = 10;              // Sequence number for durable streams (for resume)
  repeated ToolCall tool_calls = 11; // Tool calls (complete on final chunk only)
}

// DurableStreamInfo provides connection info for subscribing to a durable stream.
// Sent as the first chunk when durable=true in the request.
message DurableStreamInfo {
  string request_id = 1;   // Unique identifier for this stream
  string subject = 2;      // NATS subject to subscribe to for direct access
  string stream = 3;       // JetStream stream name
}

// ResumeStreamRequest resumes consumption of a durable stream.
message ResumeStreamRequest {
  string agent_id = 1;
  string request_id = 2;       // Stream identifier from DurableStreamInfo
  uint64 last_sequence = 3;    // Last acknowledged sequence (resume from next)
}

message ListModelsRequest {}

message Model {
  string id = 1;
  string name = 2;
  string backend = 3;
  bool available = 4;
}

message ListModelsResponse {
  repeated Model models = 1;
}

// ============ Memory Session Messages ============

message SessionProfile {
  string type = 1;                    // "rolling_window"
  int32 max_tokens = 2;
  int32 summarization_threshold = 3;
}

message CreateSessionRequest {
  string agent_id = 1;
  SessionProfile profile = 2;
  string system_prompt = 3;  // Agent personality/instructions for this session
}

message GetSessionRequest {
  string agent_id = 1;
  string session_id = 2;
}

message DeleteSessionRequest {
  string agent_id = 1;
  string session_id = 2;
}

message DeleteSessionResponse {
  bool ok = 1;
}

message SessionMessage {
  string role = 1;
  string content = 2;
  google.protobuf.Timestamp timestamp = 3;
  int32 tokens = 4;
}

message Session {
  string id = 1;
  string agent_id = 2;
  repeated SessionMessage messages = 3;
  string summary = 4;
  repeated string hints = 5;
  SessionProfile profile = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  string system_prompt = 9;  // Agent personality/instructions
}

message AddHintRequest {
  string agent_id = 1;
  string session_id = 2;
  string hint = 3;
}

message AddHintResponse {
  bool ok = 1;
}

// ============ KV Storage Messages ============

message KVGetRequest {
  string agent_id = 1;
  string bucket = 2;
  string key = 3;
}

message KVGetResponse {
  bytes value = 1;
  uint64 revision = 2;
}

message KVPutRequest {
  string agent_id = 1;
  string bucket = 2;
  string key = 3;
  bytes value = 4;
}

message KVPutResponse {
  uint64 revision = 1;
}

message KVDeleteRequest {
  string agent_id = 1;
  string bucket = 2;
  string key = 3;
}

message KVDeleteResponse {
  bool ok = 1;
}

message KVListRequest {
  string agent_id = 1;
  string bucket = 2;
  string prefix = 3;  // Optional key prefix filter
}

message KVListResponse {
  repeated string keys = 1;
}
