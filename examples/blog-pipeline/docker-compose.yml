# Blog Pipeline - Docker Compose
#
# Runs all pipeline agents as separate containers demonstrating
# true distributed multi-agent architecture.
#
# Prerequisites:
#   - Athyr server running on host (or configure ATHYR_ADDR)
#   - Build images first: docker compose build
#
# Usage:
#   1. Start agents: docker compose up
#   2. Run orchestrator: docker compose run orchestrator --topic "Your Topic"

services:
  outline-agent:
    build:
      context: ../..
      dockerfile: examples/blog-pipeline/Dockerfile
      args:
        AGENT: outline-agent
    environment:
      ATHYR_ADDR: ${ATHYR_ADDR:-host.docker.internal:9090}
      MODEL: ${MODEL:-qwen3:4b}
    restart: unless-stopped

  draft-agent:
    build:
      context: ../..
      dockerfile: examples/blog-pipeline/Dockerfile
      args:
        AGENT: draft-agent
    environment:
      ATHYR_ADDR: ${ATHYR_ADDR:-host.docker.internal:9090}
      MODEL: ${MODEL:-qwen3:4b}
    restart: unless-stopped

  edit-agent:
    build:
      context: ../..
      dockerfile: examples/blog-pipeline/Dockerfile
      args:
        AGENT: edit-agent
    environment:
      ATHYR_ADDR: ${ATHYR_ADDR:-host.docker.internal:9090}
      MODEL: ${MODEL:-qwen3:4b}
    restart: unless-stopped

  seo-agent:
    build:
      context: ../..
      dockerfile: examples/blog-pipeline/Dockerfile
      args:
        AGENT: seo-agent
    environment:
      ATHYR_ADDR: ${ATHYR_ADDR:-host.docker.internal:9090}
      MODEL: ${MODEL:-qwen3:4b}
    restart: unless-stopped

  # Orchestrator runs on-demand to execute the pipeline
  orchestrator:
    build:
      context: ../..
      dockerfile: examples/blog-pipeline/Dockerfile
      args:
        AGENT: orchestrator
    environment:
      ATHYR_ADDR: ${ATHYR_ADDR:-host.docker.internal:9090}
      OUTPUT_PATH: ${OUTPUT_PATH:-/app/output/blog-post.md}
    profiles: ["cli"]
    volumes:
      - ./output:/app/output
